<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수능 주간 플래너</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  body {
    background: #F6F3EC;
    padding: 24px 16px 60px;
    color: #2B2B26;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    margin-bottom: 16px;
  }
  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .header-top h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .week-indicator {
    font-size: 13px;
    color: #8a8a7a;
    font-weight: 500;
  }
  .sub-title {
    font-size: 13px;
    color: #8a8a7a;
    margin-top: 2px;
  }
  .card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 16px;
    border: 1px solid #E8E3D8;
  }
  .nav-box {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .nav-btn {
    flex: 1;
    padding: 8px 0;
    border-radius: 10px;
    border: 1px solid #DDD6C3;
    background: #FCFAF3;
    color: #5a5a4e;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .nav-btn:disabled {
    background: #F0EDE2;
    color: #c0bcac;
    cursor: default;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-title {
    font-size: 13px;
    font-weight: 600;
    color: #5a5a4e;
  }
  .progress-pct {
    font-size: 18px;
    font-weight: 800;
    color: #3B6E5C;
  }
  .progress-bar-bg {
    height: 10px;
    background: #EEE9DC;
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #3B6E5C, #6E9B87);
    border-radius: 6px;
    transition: width 0.3s ease;
  }
  .attendance-grid {
    display: flex;
    gap: 6px;
    justify-content: space-between;
  }
  .day-btn {
    flex: 1;
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1.5px solid #DDD6C3;
    background: #FCFAF3;
    color: #8a8a7a;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .day-btn.checked {
    border: none;
    background: #3B6E5C;
    color: #fff;
  }
  
  /* 과목 그룹 스타일 */
  .subject-group {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #E8E3D8;
  }
  .group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #F6F3EC;
  }
  .group-title {
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }
  .del-group-btn {
    background: none;
    border: none;
    color: #d9534f;
    font-size: 11px;
    cursor: pointer;
  }
  
  /* 세부 목표 스타일 */
  .sub-task {
    background: #FCFAF3;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    border: 1px solid #E8E3D8;
  }
  .sub-task:last-child {
    margin-bottom: 0;
  }
  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .task-goal {
    font-size: 13px;
    font-weight: 600;
    color: #4A4A40;
    cursor: pointer;
    padding-right: 8px;
  }
  .task-right-side {
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .task-count {
    font-size: 13px;
    font-weight: 700;
    color: #2B2B26;
    cursor: pointer;
  }
  .task-unit {
    font-size: 11px;
    color: #a0a090;
    font-weight: 500;
  }
  .del-task-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 14px;
    cursor: pointer;
    padding: 0 2px;
  }
  .del-task-btn:hover {
    color: #d9534f;
  }
  .task-bar-bg {
    height: 6px;
    background: #EEE9DC;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .task-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .btn-row {
    display: flex;
    gap: 6px;
  }
  .step-btn {
    flex: 1;
    padding: 6px 0;
    border-radius: 6px;
    border: 1px solid #DDD6C3;
    background: #FFFFFF;
    color: #5a5a4e;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  
  .add-btn-inline {
    background: none;
    border: 1px dashed #DDD6C3;
    border-radius: 8px;
    width: 100%;
    padding: 6px 0;
    font-size: 12px;
    color: #8a8a7a;
    cursor: pointer;
    margin-top: 10px;
  }
  .add-btn-main {
    width: 100%;
    padding: 12px 0;
    border-radius: 12px;
    border: 1px solid #3B6E5C;
    background: #FFFFFF;
    color: #3B6E5C;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .export-btn {
    width: 100%;
    padding: 12px 0;
    border-radius: 10px;
    border: none;
    background: #2B2B26;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .export-box {
    background: #FFFFFF;
    border: 1px solid #E8E3D8;
    border-radius: 12px;
    padding: 14px;
    margin-top: 20px;
  }
  textarea {
    width: 100%;
    min-height: 160px;
    font-size: 12px;
    font-family: monospace;
    border: 1px solid #EEE9DC;
    border-radius: 8px;
    padding: 10px;
    resize: none;
  }
  .link-btn {
    background: none;
    border: none;
    color: #a0a090;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-top">
      <h1 id="dday-display">D-138</h1>
      <div class="week-indicator" id="week-display">1주차</div>
    </div>
    <div class="sub-title">수능까지 · 이번 주 학습 트래커</div>
  </div>

  <div class="nav-box">
    <button class="nav-btn" id="prev-btn" onclick="changeWeek(-1)">← 이전 주</button>
    <button class="nav-btn" id="next-btn" onclick="changeWeek(1)">다음 주 →</button>
  </div>

  <!-- 전체 진행률 카드 -->
  <div class="card">
    <div class="progress-header">
      <span class="progress-title">이번 주 전체 진행률</span>
      <span class="progress-pct" id="overall-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="overall-bar"></div>
    </div>
  </div>

  <!-- 출석 체크 카드 -->
  <div class="card">
    <div class="progress-title" style="margin-bottom: 10px;">매일 앉았나요? (출석 체크)</div>
    <div class="attendance-grid" id="attendance-box"></div>
  </div>

  <!-- 과목별 그룹 리스트 영역 -->
  <div id="subject-groups-box"></div>

  <!-- 과목 추가 버튼 -->
  <button class="add-btn-main" onclick="addSubjectGroup()">+ 새 과목 추가하기</button>

  <!-- 내보내기 영역 -->
  <div id="export-area">
    <button class="export-btn" onclick="toggleExport(true)">📋 기록 내보내기 (텍스트로 복사)</button>
  </div>

  <!-- 초기화 영역 -->
  <div style="margin-top: 20px; text-align: center;" id="reset-area">
    <button class="link-btn" onclick="confirmReset(true)">이번 주 기록 초기화</button>
  </div>
</div>

<script>
const WEEK_START_DDAY = 138;
const DAYS = ["월", "화", "수", "목", "금", "토", "일"];

// 초기 기본 구조 (처음 열었을 때 데이터가 없는 경우 생성됨)
const INITIAL_DATA_STRUCTURE = [
  {
    subject: "수학", color: "#3B6E5C",
    subTasks: [{ id: "math-" + Date.now(), goal: "개념강의 5강 + 개념문제 100제", unit: "개", target: 105, done: 0 }]
  },
  {
    subject: "국어", color: "#8B5A3C",
    subTasks: [
      { id: "kor-1-" + Date.now(), goal: "화법+작문 개념 정리 완강", unit: "강", target: 8, done: 0 },
      { id: "kor-2-" + Date.now(), goal: "문학 5지문 + 비문학 3지문", unit: "지문", target: 8, done: 0 }
    ]
  },
  {
    subject: "영어", color: "#3C5A8B",
    subTasks: [
      { id: "eng-1-" + Date.now(), goal: "단어 300개 (하루 50개×6일)", unit: "회", target: 6, done: 0 },
      { id: "eng-2-" + Date.now(), goal: "구문독해 3회", unit: "회", target: 3, done: 0 }
    ]
  }
];

// 랜덤 색상 목록 (새 과목 추가할 때 무작위 부여)
const COLORS = ["#3B6E5C", "#8B5A3C", "#3C5A8B", "#6E4A8B", "#8B7A3C", "#5C5C5C", "#A3485E"];

let weekOffset = 0;
let globalData = {};

function loadData() {
  const saved = localStorage.getItem("customWeeklyTrackerV3");
  if (saved) {
    try { globalData = JSON.parse(saved); } catch(e) { globalData = {}; }
  }
}

function saveData() {
  localStorage.setItem("customWeeklyTrackerV3", JSON.stringify(globalData));
}

function getWeekData() {
  const key = `week-${weekOffset}`;
  if (!globalData[key]) {
    globalData[key] = {
      dailyCheck: {},
      groups: JSON.parse(JSON.stringify(INITIAL_DATA_STRUCTURE))
    };
  }
  return globalData[key];
}

function render() {
  const current = getWeekData();
  const dDayStart = WEEK_START_DDAY - (weekOffset * 7);
  
  document.getElementById("dday-display").innerText = `D-${dDayStart}`;
  document.getElementById("week-display").innerText = `${weekOffset + 1}주차`;
  document.getElementById("prev-btn").disabled = (weekOffset === 0);

  // 1. 출석체크 렌더링
  let attHtml = "";
  DAYS.forEach((day, i) => {
    const isChecked = !!current.dailyCheck[`d${i}`];
    attHtml += `<button class="day-btn ${isChecked ? 'checked' : ''}" onclick="toggleDay(${i})">${day}</button>`;
  });
  document.getElementById("attendance-box").innerHTML = attHtml;

  // 2. 과목 그룹 및 세부 목표 렌더링
  let groupsHtml = "";
  let totalTarget = 0;
  let totalDone = 0;

  current.groups.forEach((group, gIdx) => {
    let subTasksHtml = "";
    
    group.subTasks.forEach((task, tIdx) => {
      totalTarget += task.target;
      totalDone += task.done;

      const pct = task.target > 0 ? Math.round((task.done / task.target) * 100) : 0;
      const isComplete = task.done >= task.target;

      subTasksHtml += `
        <div class="sub-task" style="border-left: 4px solid ${group.color}; opacity: ${isComplete ? 0.75 : 1};">
          <div class="task-top">
            <div class="task-goal" onclick="editGoalText(${gIdx}, ${tIdx})" title="글자 수정">
              ${task.goal} ${isComplete ? '✓' : ''}
            </div>
            <div class="task-right-side">
              <div class="task-count" onclick="editTargetAndUnit(${gIdx}, ${tIdx})" title="목표 및 단위 수정">
                ${task.done}/${task.target} <span class="task-unit">${task.unit} ✎</span>
              </div>
              <button class="del-task-btn" onclick="deleteSubTask(${gIdx}, ${tIdx})" title="목표 삭제">×</button>
            </div>
          </div>
          <div class="task-bar-bg">
            <div class="task-bar-fill" style="width: ${pct}%; background: ${group.color};"></div>
          </div>
          <div class="btn-row">
            <button class="step-btn" onclick="updateProgress(${gIdx}, ${tIdx}, -1)">−</button>
            <button class="step-btn" style="background: ${group.color}; color: #fff; border: none;" onclick="updateProgress(${gIdx}, ${tIdx}, 1)">+ 완료</button>
          </div>
        </div>
      `;
    });

    groupsHtml += `
      <div class="subject-group">
        <div class="group-header">
          <div class="group-title" style="color: ${group.color};" onclick="editSubjectName(${gIdx})" title="과목명 수정">${group.subject} ✎</div>
          <button class="del-group-btn" onclick="deleteSubjectGroup(${gIdx})">과목삭제</button>
        </div>
        <div>
          ${subTasksHtml}
          <button class="add-btn-inline" onclick="addSubTask(${gIdx})">+ 목표 추가</button>
        </div>
      </div>
    `;
  });
  
  document.getElementById("subject-groups-box").innerHTML = groupsHtml;

  // 전체 진행률 업데이트
  const overallPct = totalTarget > 0 ? Math.round((totalDone / totalTarget) * 100) : 0;
  document.getElementById("overall-pct").innerText = `${overallPct}%`;
  document.getElementById("overall-bar").style.width = `${overallPct}%`;

  saveData();
}

// 수량 변경 (+1, -1)
function updateProgress(gIdx, tIdx, delta) {
  const current = getWeekData();
  const task = current.groups[gIdx].subTasks[tIdx];
  task.done = Math.max(0, Math.min(task.target, task.done + delta));
  render();
}

// 출석 토글
function toggleDay(dayIdx) {
  const current = getWeekData();
  const key = `d${dayIdx}`;
  current.dailyCheck[key] = !current.dailyCheck[key];
  render();
}

// 주차 이동
function changeWeek(delta) {
  weekOffset = Math.max(0, weekOffset + delta);
  toggleExport(false);
  render();
}

/* --- 여기서부터 새롭게 업그레이드된 동적 편집 기능 함수들 --- */

// 1. 과목 이름 수정
function editSubjectName(gIdx) {
  const current = getWeekData();
  const v = prompt("과목 이름을 수정하세요:", current.groups[gIdx].subject);
  if (!v || !v.trim()) return;
  current.groups[gIdx].subject = v.trim();
  render();
}

// 2. 세부 목표 글자 수정
function editGoalText(gIdx, tIdx) {
  const current = getWeekData();
  const task = current.groups[gIdx].subTasks[tIdx];
  const v = prompt("목표 내용을 수정하세요:", task.goal);
  if (!v || !v.trim()) return;
  task.goal = v.trim();
  render();
}

// 3. 목표 수량 및 단위 한 번에 수정
function editTargetAndUnit(gIdx, tIdx) {
  const current = getWeekData();
  const task = current.groups[gIdx].subTasks[tIdx];
  
  const numVal = prompt("목표 수량을 입력하세요 (숫자만):", task.target);
  if (numVal === null) return;
  const num = parseInt(numVal, 10);
  if (isNaN(num) || num <= 0) {
    alert("올바른 숫자를 입력해주세요.");
    return;
  }
  
  const unitVal = prompt("단위를 입력하세요 (예: 개, 강, 지문, 단원):", task.unit);
  if (unitVal === null) return;

  task.target = num;
  if (unitVal.trim()) task.unit = unitVal.trim();
  if (task.done > task.target) task.done = task.target;
  
  render();
}

// 4. 새 과목 그룹 추가
function addSubjectGroup() {
  const current = getWeekData();
  const name = prompt("새로 추가할 과목명을 입력하세요 (예: 사문, 물화, 생글):");
  if (!name || !name.trim()) return;

  const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  current.groups.push({
    subject: name.trim(),
    color: randomColor,
    subTasks: []
  });
  render();
}

// 5. 과목 통째로 삭제
function deleteSubjectGroup(gIdx) {
  const current = getWeekData();
  if (confirm(`[${current.groups[gIdx].subject}] 과목과 안의 모든 목표가 삭제됩니다. 정말 삭제할까요?`)) {
    current.groups.splice(gIdx, 1);
    render();
  }
}

// 6. 특정 과목 안에 세부 목표 추가
function addSubTask(gIdx) {
  const current = getWeekData();
  const goal = prompt("세부 공부 목표를 입력하세요:");
  if (!goal || !goal.trim()) return;
  
  const targetVal = prompt("목표 수량을 입력하세요 (숫자만):", "5");
  const target = parseInt(targetVal, 10);
  if (isNaN(target) || target <= 0) return;

  const unit = prompt("단위를 입력하세요 (예: 강, 개, 지문):", "개");
  if (!unit || !unit.trim()) return;

  current.groups[gIdx].subTasks.push({
    id: "task-" + Date.now() + Math.random(),
    goal: goal.trim(),
    unit: unit.trim(),
    target: target,
    done: 0
  });
  render();
}

// 7. 세부 목표만 골라서 삭제
function deleteSubTask(gIdx, tIdx) {
  const current = getWeekData();
  if (confirm("이 목표를 삭제하시겠습니까?")) {
    current.groups[gIdx].subTasks.splice(tIdx, 1);
    render();
  }
}

/* --- 데이터 출력 및 리셋 --- */
function generateExportText() {
  const current = getWeekData();
  const dDayStart = WEEK_START_DDAY - (weekOffset * 7);
  
  let totalTarget = 0; let totalDone = 0;
  const lines = [`D-${dDayStart} (${weekOffset + 1}주차) 수능 플래너 기록`, ""];
  
  current.groups.forEach((group) => {
    lines.push(`■ ${group.subject}`);
    group.subTasks.forEach((t) => {
      totalTarget += t.target; totalDone += t.done;
      lines.push(` - ${t.goal}: ${t.done}/${t.target} ${t.unit}`);
    });
  });
  
  const overallPct = totalTarget > 0 ? Math.round((totalDone / totalTarget) * 100) : 0;
  const checkedDays = DAYS.filter((_, i) => current.dailyCheck[`d${i}`]);
  
  lines.push("");
  lines.push(`출석 요일: ${checkedDays.length > 0 ? checkedDays.join(", ") : "없음"}`);
  lines.push(`주간 총 진행률: ${overallPct}%`);
  return lines.join("\n");
}

function toggleExport(show) {
  const area = document.getElementById("export-area");
  if (show) {
    area.innerHTML = `
      <div class="export-box">
        <textarea readonly onclick="this.select()">${generateExportText()}</textarea>
        <div style="font-size: 11px; color: #a0a090; margin-top: 6px;">상자 안을 터치해서 복사하세요!</div>
        <button class="link-btn" style="margin-top: 8px;" onclick="toggleExport(false)">닫기</button>
      </div>
    `;
  } else {
    area.innerHTML = `<button class="export-btn" onclick="toggleExport(true)">📋 기록 내보내기 (텍스트로 복사)</button>`;
  }
}

function confirmReset(ask) {
  const area = document.getElementById("reset-area");
  if (ask) {
    area.innerHTML = `
      <div style="font-size: 12px; color: #a04a3c;">
        정말 이번 주 기록을 비울까요? (커스텀 설정도 초기화됩니다) 
        <button class="link-btn" style="color: #a04a3c; font-weight: 700;" onclick="resetWeek()">네</button> / 
        <button class="link-btn" onclick="confirmReset(false)">아니오</button>
      </div>
    `;
  } else {
    area.innerHTML = `<button class="link-btn" onclick="confirmReset(true)">이번 주 기록 초기화</button>`;
  }
}

function resetWeek() {
  const key = `week-${weekOffset}`;
  globalData[key] = {
    dailyCheck: {},
    groups: JSON.parse(JSON.stringify(INITIAL_DATA_STRUCTURE))
  };
  confirmReset(false);
  render();
}

// 초기화 구동
loadData();
render();
</script>
</body>
</html>
