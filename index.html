<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 개인 맞춤 플래너</title>
<meta property="og:title" content="주간 개인 맞춤 플래너">
<meta property="og:description" content="나만의 목표와 공부 시간을 관리하는 맞춤형 트래커">
<meta property="og:type" content="website">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  body {
    background: #F6F3EC;
    padding: 24px 16px 60px;
    color: #2B2B26;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    margin-bottom: 16px;
  }
  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .dday-wrapper {
    position: relative;
    display: inline-block;
  }
  .dday-wrapper h1 {
    font-size: 26px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.02em;
    color: #2B2B26;
  }
  .dday-wrapper input[type="date"] {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    font-size: 16px;
  }
  .week-indicator {
    font-size: 13px;
    color: #8a8a7a;
    font-weight: 500;
  }
  .sub-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2px;
  }
  .sub-title {
    font-size: 13px;
    color: #8a8a7a;
  }
  .total-time-display {
    font-size: 13px;
    font-weight: 700;
    color: #3B6E5C;
    background: #EAE3D2;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 16px;
    border: 1px solid #E8E3D8;
  }
  .nav-box {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .nav-btn {
    flex: 1;
    padding: 8px 0;
    border-radius: 10px;
    border: 1px solid #DDD6C3;
    background: #FCFAF3;
    color: #5a5a4e;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .nav-btn:disabled {
    background: #F0EDE2;
    color: #c0bcac;
    cursor: default;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-title {
    font-size: 13px;
    font-weight: 600;
    color: #5a5a4e;
  }
  .progress-pct {
    font-size: 18px;
    font-weight: 800;
    color: #3B6E5C;
  }
  .progress-bar-bg {
    height: 10px;
    background: #EEE9DC;
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #3B6E5C, #6E9B87);
    border-radius: 6px;
    transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .attendance-grid {
    display: flex;
    gap: 6px;
    justify-content: space-between;
  }
  .day-btn {
    flex: 1;
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1.5px solid #DDD6C3;
    background: #FCFAF3;
    color: #8a8a7a;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .day-btn.checked {
    border: none;
    background: #3B6E5C;
    color: #fff;
  }
  
  .subject-group {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #E8E3D8;
  }
  .group-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #F6F3EC;
  }
  .group-title-side {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-title {
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }
  
  .color-picker-btn {
    position: relative;
    display: inline-block;
    font-size: 12px;
    background: #F0EDE2;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    color: #5a5a4e;
    cursor: pointer;
  }
  .color-picker-btn input[type="color"] {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .group-time {
    font-size: 12px;
    font-weight: 700;
    color: #555;
    background: #F0EDE2;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
  }
  .del-group-btn {
    background: none;
    border: none;
    color: #d9534f;
    font-size: 11px;
    cursor: pointer;
  }
  
  .sub-task {
    background: #FCFAF3;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    border: 1px solid #E8E3D8;
    transition: opacity 0.3s ease;
  }
  .sub-task:last-child {
    margin-bottom: 0;
  }
  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .task-goal-wrapper {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    padding-right: 8px;
  }
  .task-goal {
    font-size: 13px;
    font-weight: 600;
    color: #4A4A40;
    line-height: 1.4;
  }
  .edit-icon-btn {
    background: none;
    border: none;
    font-size: 11px;
    cursor: pointer;
    color: #a0a090;
    padding: 2px 4px;
  }
  .task-right-side {
    display: flex;
    align-items: center;
    white-space: nowrap;
  }
  .task-count {
    font-size: 13px;
    font-weight: 800;
    color: #2B2B26;
    cursor: pointer;
    background: #EFEFEF;
    padding: 4px 8px;
    border-radius: 6px;
    text-align: center;
  }
  .del-task-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 16px;
    cursor: pointer;
    padding: 0 4px;
    margin-left: 6px;
  }

  /* 슬라이더 스타일 */
  .slider-wrapper {
    margin-top: 6px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
  }
  .task-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    background-size: 100% 100%;
    transition: background 0.15s ease-out; 
    touch-action: none;
  }
  .task-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ffffff;
    border: 3px solid #3B6E5C;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .task-slider::-webkit-slider-thumb:active {
    transform: scale(1.3);
  }

  /* [수정] 슬라이더 하단에 정렬되는 큰 터치 버튼 그룹 */
  .btn-group-bottom {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .cnt-btn-bottom {
    flex: 1;
    padding: 7px 0;
    border-radius: 8px;
    border: 1px solid #DDD6C3;
    background: #FFFFFF;
    font-size: 12px;
    font-weight: 600;
    color: #5a5a4e;
    cursor: pointer;
    transition: background 0.1s;
  }
  .cnt-btn-bottom:active {
    background: #F0EDE2;
  }
  
  .add-btn-inline {
    background: none;
    border: 1px dashed #DDD6C3;
    border-radius: 8px;
    width: 100%;
    padding: 6px 0;
    font-size: 12px;
    color: #8a8a7a;
    cursor: pointer;
    margin-top: 10px;
  }
  .add-btn-main {
    width: 100%;
    padding: 12px 0;
    border-radius: 12px;
    border: 1px solid #3B6E5C;
    background: #FFFFFF;
    color: #3B6E5C;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .export-btn {
    width: 100%;
    padding: 12px 0;
    border-radius: 10px;
    border: none;
    background: #2B2B26;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .export-box {
    background: #FFFFFF;
    border: 1px solid #E8E3D8;
    border-radius: 12px;
    padding: 14px;
    margin-top: 20px;
  }
  textarea {
    width: 100%;
    min-height: 160px;
    font-size: 12px;
    font-family: monospace;
    border: 1px solid #EEE9DC;
    border-radius: 8px;
    padding: 10px;
    resize: none;
  }
  .link-btn {
    background: none;
    border: none;
    color: #a0a090;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-top">
      <div class="dday-wrapper" title="목표 날짜 바꾸기">
        <h1 id="dday-display">D-138 ✏️</h1>
        <input type="date" id="target-date-picker" onchange="saveTargetDate(this.value)">
      </div>
      <div class="week-indicator" id="week-display">1주차</div>
    </div>
    <div class="sub-title-row">
      <div class="sub-title" id="sub-title-desc">나만의 커스텀 주간 트래커</div>
      <div class="total-time-display">총 공부 시간: <span id="total-time-sum">00:00:00</span></div>
    </div>
  </div>

  <div class="nav-box">
    <button class="nav-btn" id="prev-btn" onclick="changeWeek(-1)">← 이전 주</button>
    <button class="nav-btn" id="next-btn" onclick="changeWeek(1)">다음 주 →</button>
  </div>

  <div class="card">
    <div class="progress-header">
      <span class="progress-title">이번 주 전체 진행률</span>
      <span class="progress-pct" id="overall-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="overall-bar"></div>
    </div>
  </div>

  <div class="card">
    <div class="progress-title" style="margin-bottom: 10px;">매일 공부했나요?</div>
    <div class="attendance-grid" id="attendance-box"></div>
  </div>

  <div id="subject-groups-box"></div>

  <button class="add-btn-main" onclick="addSubjectGroup()">+ 새 과목 추가하기</button>

  <div id="export-area">
    <button class="export-btn" onclick="toggleExport(true)">📋 기록 내보내기 (텍스트로 복사)</button>
  </div>

  <div style="margin-top: 20px; text-align: center;" id="reset-area">
    <button class="link-btn" onclick="confirmReset(true)">이번 주 기록 초기화</button>
  </div>
</div>

<script>
const DAYS = ["월", "화", "수", "목", "금", "토", "일"];

const INITIAL_DATA_STRUCTURE = [
  {
    subject: "수학", color: "#3B6E5C", minutes: 0,
    subTasks: [{ id: "math-" + Date.now(), goal: "개념강의 5강 + 개념문제 100제", target: 105, done: 0 }]
  },
  {
    subject: "국어", color: "#8B5A3C", minutes: 0,
    subTasks: [
      { id: "kor-1-" + Date.now(), goal: "화법+작문 개념 정리 완강", target: 8, done: 0 },
      { id: "kor-2-" + Date.now(), goal: "문학 5지문 + 비문학 3지문", target: 8, done: 0 }
    ]
  },
  {
    subject: "영어", color: "#3C5A8B", minutes: 0,
    subTasks: [
      { id: "eng-1-" + Date.now(), goal: "단어 300개 (하루 50개×6일)", target: 6, done: 0 },
      { id: "eng-2-" + Date.now(), goal: "구문독해 3회", target: 3, done: 0 }
    ]
  }
];

const COLORS = ["#3B6E5C", "#8B5A3C", "#3C5A8B", "#6E4A8B", "#8B7A3C", "#5C5C5C", "#A3485E"];

let weekOffset = 0;
let globalData = {};
let targetDateStr = ""; 

function formatMinutesToHMS(totalMinutes) {
  if (!totalMinutes || totalMinutes < 0) return "00:00:00";
  const hours = Math.floor(totalMinutes / 60);
  const minutes = totalMinutes % 60;
  return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:00`;
}

function loadData() {
  const saved = localStorage.getItem("customWeeklyTrackerV6");
  if (saved) {
    try { globalData = JSON.parse(saved); } catch(e) { globalData = {}; }
  }
  
  const savedDate = localStorage.getItem("customWeeklyTracker_TargetDate");
  if (savedDate) {
    targetDateStr = savedDate;
  } else {
    const d = new Date();
    d.setDate(d.getDate() + 138);
    targetDateStr = d.toISOString().split('T')[0];
  }
  document.getElementById("target-date-picker").value = targetDateStr;
}

function saveData() {
  localStorage.setItem("customWeeklyTrackerV6", JSON.stringify(globalData));
}

function saveTargetDate(val) {
  if(!val) return;
  targetDateStr = val;
  localStorage.setItem("customWeeklyTracker_TargetDate", val);
  render();
}

function getWeekData() {
  const key = `week-${weekOffset}`;
  if (!globalData[key]) {
    globalData[key] = {
      dailyCheck: {},
      groups: JSON.parse(JSON.stringify(INITIAL_DATA_STRUCTURE))
    };
  }
  return globalData[key];
}

function render() {
  const current = getWeekData();
  
  const today = new Date();
  today.setHours(0,0,0,0);
  
  const parts = targetDateStr.split('-');
  const target = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
  target.setHours(0,0,0,0);
  
  const diffTime = target.getTime() - today.getTime();
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  const currentDDay = diffDays - (weekOffset * 7);
  
  if (currentDDay >= 0) {
    document.getElementById("dday-display").innerText = `D-${currentDDay} ✏️`;
    document.getElementById("sub-title-desc").innerText = `목표일(${targetDateStr}) 기준 남은 일정`;
  } else {
    document.getElementById("dday-display").innerText = `D+${Math.abs(currentDDay)} ✏️`;
    document.getElementById("sub-title-desc").innerText = `목표일 완료 후 +${Math.abs(currentDDay)}일 경과`;
  }
  
  document.getElementById("week-display").innerText = `${weekOffset + 1}주차`;
  document.getElementById("prev-btn").disabled = (weekOffset === 0);

  let attHtml = "";
  DAYS.forEach((day, i) => {
    const isChecked = !!current.dailyCheck[`d${i}`];
    attHtml += `<button class="day-btn ${isChecked ? 'checked' : ''}" onclick="toggleDay(${i})">${day}</button>`;
  });
  document.getElementById("attendance-box").innerHTML = attHtml;

  let groupsHtml = "";
  let totalTarget = 0;
  let totalDone = 0;
  let weeklyTotalMinutes = 0;

  current.groups.forEach((group, gIdx) => {
    let subTasksHtml = "";
    if (group.minutes === undefined) group.minutes = 0;
    weeklyTotalMinutes += group.minutes;
    
    group.subTasks.forEach((task, tIdx) => {
      totalTarget += task.target;
      totalDone += task.done;

      const isComplete = task.done >= task.target;
      const pct = task.target > 0 ? (task.done / task.target) * 100 : 0;

      // [수정] 원래 초반 구조대로 슬라이더 하단 영역에 넓은 [-1 감소] / [+1 증가] 버튼 복구 결합
      subTasksHtml += `
        <div class="sub-task" style="border-left: 4px solid ${group.color}; opacity: ${isComplete ? 0.75 : 1};">
          <style>
            #slider-${gIdx}-${tIdx}::-webkit-slider-thumb { border-color: ${group.color} !important; }
          </style>
          <div class="task-top">
            <div class="task-goal-wrapper">
              <span class="task-goal">${task.goal} ${isComplete ? '✓' : ''}</span>
              <button class="edit-icon-btn" onclick="editGoalText(${gIdx}, ${tIdx})">✏️</button>
            </div>
            <div class="task-right-side">
              <div class="task-count" id="count-text-${gIdx}-${tIdx}" onclick="editTarget(${gIdx}, ${tIdx})" title="최대 목표치 변경">
                ${task.done}/${task.target}
              </div>
              <button class="del-task-btn" onclick="deleteSubTask(${gIdx}, ${tIdx})">×</button>
            </div>
          </div>
          <div class="slider-wrapper">
            <input type="range" class="task-slider" id="slider-${gIdx}-${tIdx}"
                   min="0" max="${task.target}" value="${task.done}" 
                   style="background: linear-gradient(to right, ${group.color} 0%, ${group.color} ${pct}%, #EEE9DC ${pct}%, #EEE9DC 100%);"
                   oninput="handleSliderInput(${gIdx}, ${tIdx}, this.value, '${group.color}')">
          </div>
          <div class="btn-group-bottom">
            <button class="cnt-btn-bottom" onclick="changeCountStep(${gIdx}, ${tIdx}, -1, '${group.color}')">-</button>
            <button class="cnt-btn-bottom" onclick="changeCountStep(${gIdx}, ${tIdx}, 1, '${group.color}')">+</button>
          </div>
        </div>
      `;
    });

    groupsHtml += `
      <div class="subject-group">
        <div class="group-header">
          <div class="group-title-side">
            <div class="group-title" style="color: ${group.color};" onclick="editSubjectName(${gIdx})" title="이름 바꾸기">
              ${group.subject} ✏️
            </div>
            <div class="color-picker-btn" title="색상 바꾸기">
              🎨 색상
              <input type="color" value="${group.color}" onchange="changeSubjectColor(${gIdx}, this.value)">
            </div>
            <div class="group-time" onclick="editSubjectTime(${gIdx})" title="공부 시간 수정">⏱️ ${formatMinutesToHMS(group.minutes)}</div>
          </div>
          <button class="del-group-btn" onclick="deleteSubjectGroup(${gIdx})">과목삭제</button>
        </div>
        <div>
          ${subTasksHtml}
          <button class="add-btn-inline" onclick="addSubTask(${gIdx})">+ 목표 추가</button>
        </div>
      </div>
    `;
  });
  
  document.getElementById("subject-groups-box").innerHTML = groupsHtml;

  const overallPct = totalTarget > 0 ? Math.round((totalDone / totalTarget) * 100) : 0;
  document.getElementById("overall-pct").innerText = `${overallPct}%`;
  document.getElementById("overall-bar").style.width = `${overallPct}%`;
  
  document.getElementById("total-time-sum").innerText = formatMinutesToHMS(weeklyTotalMinutes);

  saveData();
}

// 하단 큰 버튼 연동 함수
function changeCountStep(gIdx, tIdx, delta, color) {
  const current = getWeekData();
  const task = current.groups[gIdx].subTasks[tIdx];
  let newVal = task.done + delta;
  
  if (newVal < 0) newVal = 0;
  if (newVal > task.target) newVal = task.target;
  
  const slider = document.getElementById(`slider-${gIdx}-${tIdx}`);
  if (slider) {
    slider.value = newVal;
    handleSliderInput(gIdx, tIdx, newVal, color);
  }
}

function handleSliderInput(gIdx, tIdx, val, color) {
  const current = getWeekData();
  const task = current.groups[gIdx].subTasks[tIdx];
  const parsedVal = parseInt(val, 10);
  
  task.done = parsedVal;
  
  document.getElementById(`count-text-${gIdx}-${tIdx}`).innerText = `${parsedVal}/${task.target}`;
  
  const pct = task.target > 0 ? (parsedVal / task.target) * 100 : 0;
  const slider = document.getElementById(`slider-${gIdx}-${tIdx}`);
  if (slider) {
    slider.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${pct}%, #EEE9DC ${pct}%, #EEE9DC 100%)`;
  }

  let totalTarget = 0;
  let totalDone = 0;
  current.groups.forEach(g => {
    g.subTasks.forEach(t => {
      totalTarget += t.target;
      totalDone += t.done;
    });
  });
  const overallPct = totalTarget > 0 ? Math.round((totalDone / totalTarget) * 100) : 0;
  document.getElementById("overall-pct").innerText = `${overallPct}%`;
  document.getElementById("overall-bar").style.width = `${overallPct}%`;

  saveData();
}

function changeSubjectColor(gIdx, newColor) {
  const current = getWeekData();
  current.groups[gIdx].color = newColor;
  render();
}

function editSubjectTime(gIdx) {
  const current = getWeekData();
  const group = current.groups[gIdx];
  const val = prompt(`[${group.subject}]의 공부 시간을 입력해 주세요 (분 단위 숫자만):`, group.minutes || 0);
  if (val === null) return;
  
  const parsed = parseInt(val, 10);
  if (isNaN(parsed) || parsed < 0) return;
  
  group.minutes = parsed;
  render();
}

function toggleDay(dayIdx) {
  const current = getWeekData();
  const key = `d${dayIdx}`;
  current.dailyCheck[key] = !current.dailyCheck[key];
  render();
}

function changeWeek(delta) {
  weekOffset = Math.max(0, weekOffset + delta);
  toggleExport(false);
  render();
}

function editSubjectName(gIdx) {
  const current = getWeekData();
  const v = prompt("과목 이름을 수정하세요:", current.groups[gIdx].subject);
  if (v === null || !v.trim()) return;
  current.groups[gIdx].subject = v.trim();
  render();
}

function editGoalText(gIdx, tIdx) {
  const current = getWeekData();
  const task = current.groups[gIdx].subTasks[tIdx];
  const v = prompt("공부 목표 내용을 수정하세요:", task.goal);
  if (v === null || !v.trim()) return;
  task.goal = v.trim();
  render();
}

function editTarget(gIdx, tIdx) {
  const current = getWeekData();
  const task = current.groups[gIdx].subTasks[tIdx];
  const numVal = prompt("목표 수량(최대치)을 수정하세요:", task.target);
  if (numVal === null) return;
  const num = parseInt(numVal, 10);
  if (isNaN(num) || num <= 0) return;

  task.target = num;
  if (task.done > task.target) task.done = task.target;
  render();
}

function addSubjectGroup() {
  const current = getWeekData();
  const name = prompt("새로 추가할 과목명을 입력하세요:");
  if (!name || !name.trim()) return;

  const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  current.groups.push({
    subject: name.trim(),
    color: randomColor,
    minutes: 0,
    subTasks: []
  });
  render();
}

function deleteSubjectGroup(gIdx) {
  const current = getWeekData();
  if (confirm(`[${current.groups[gIdx].subject}] 과목이 삭제됩니다. 정말 삭제할까요?`)) {
    current.groups.splice(gIdx, 1);
    render();
  }
}

function addSubTask(gIdx) {
  const current = getWeekData();
  const goal = prompt("세부 공부 목표를 입력하세요:");
  if (!goal || !goal.trim()) return;
  
  const targetVal = prompt("목표 총 수량을 입력하세요 (슬라이더의 최대치):", "10");
  const target = parseInt(targetVal, 10);
  if (isNaN(target) || target <= 0) return;

  current.groups[gIdx].subTasks.push({
    id: "task-" + Date.now() + Math.random(),
    goal: goal.trim(),
    target: target,
    done: 0
  });
  render();
}

function deleteSubTask(gIdx, tIdx) {
  const current = getWeekData();
  if (confirm("이 목표를 삭제하시겠습니까?")) {
    current.groups[gIdx].subTasks.splice(tIdx, 1);
    render();
  }
}

function generateExportText() {
  const current = getWeekData();
  let totalTarget = 0; let totalDone = 0; let totalMin = 0;
  const lines = [`[내 맞춤형 주간 플래너 기록 - ${weekOffset + 1}주차]`, `목표일(${targetDateStr}) 기준 일정`, ""];
  
  current.groups.forEach((group) => {
    const minVal = group.minutes || 0;
    totalMin += minVal;
    lines.push(`■ ${group.subject} (공부 시간: ${formatMinutesToHMS(minVal)})`);
    group.subTasks.forEach((t) => {
      totalTarget += t.target; totalDone += t.done;
      lines.push(` - ${t.goal}: ${t.done}/${t.target}`);
    });
  });
  
  const overallPct = totalTarget > 0 ? Math.round((totalDone / totalTarget) * 100) : 0;
  const checkedDays = DAYS.filter((_, i) => current.dailyCheck[`d${i}`]);
  
  lines.push("");
  lines.push(`출석 요일: ${checkedDays.length > 0 ? checkedDays.join(", ") : "없음"}`);
  lines.push(`주간 총 공부 시간: ${formatMinutesToHMS(totalMin)}`);
  lines.push(`주간 목표 달성률: ${overallPct}%`);
  return lines.join("\n");
}

function toggleExport(show) {
  const area = document.getElementById("export-area");
  if (show) {
    area.innerHTML = `
      <div class="export-box">
        <textarea readonly onclick="this.select()">${generateExportText()}</textarea>
        <div style="font-size: 11px; color: #a0a090; margin-top: 6px;">상자 안을 터치해서 복사하세요!</div>
        <button class="link-btn" style="margin-top: 8px;" onclick="toggleExport(false)">닫기</button>
      </div>
    `;
  } else {
    area.innerHTML = `<button class="export-btn" onclick="toggleExport(true)">📋 기록 내보내기 (텍스트로 복사)</button>`;
  }
}

function confirmReset(ask) {
  const area = document.getElementById("reset-area");
  if (ask) {
    area.innerHTML = `
      <div style="font-size: 12px; color: #a04a3c;">
        정말 이번 주 기록을 초기화할까요?
        <button class="link-btn" style="color: #a04a3c; font-weight: 700;" onclick="resetWeek()">네</button> / 
        <button class="link-btn" onclick="confirmReset(false)">아니오</button>
      </div>
    `;
  } else {
    area.innerHTML = `<button class="link-btn" onclick="confirmReset(true)">이번 주 기록 초기화</button>`;
  }
}

function resetWeek() {
  const key = `week-${weekOffset}`;
  globalData[key] = {
    dailyCheck: {},
    groups: JSON.parse(JSON.stringify(INITIAL_DATA_STRUCTURE))
  };
  confirmReset(false);
  render();
}

loadData();
render();
</script>
